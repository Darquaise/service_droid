name: ${COMPOSE_PROJECT_NAME:-service-droid}

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATA_DIR: /app/data  # logs
    networks:
      - shared-db
    volumes:
      - sd-data:/app/data  # logs
    restart: unless-stopped
    mem_limit: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  shared-db:
    external: true  # created/owned by main-server-infra

volumes:
  sd-data: { }
